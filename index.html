cat > index.html << 'EOF'
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dev Notes</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Dev Notes</h1>
    <p class="subtitle">Your personal developer notepad</p>
    <div class="input-row">
      <input type="text" id="noteInput" placeholder="Type a note and press Add..." />
      <button onclick="addNote()">Add</button>
    </div>
    <ul id="noteList"></ul>
  </div>
  <script src="app.js"></script>
</body>
</html>
EOF
